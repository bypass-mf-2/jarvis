<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>JARVIS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      /* Wake overlay needs a transparent body so the rounded glass panel
         shows through. Panel views set their own opaque background via
         the bg-background utility on their root container. */
      html, body, #root {
        margin: 0;
        padding: 0;
        background: transparent;
        color: white;
        font-family: system-ui, -apple-system, sans-serif;
        overflow: hidden;
        user-select: none;
        min-height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
